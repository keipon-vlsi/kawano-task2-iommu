# Baseline IOMMU configuration (design_doc §4 / usage_manual §3).
# Nested 2-stage, contiguous IOVA + contiguous guest data GPA, single context,
# pinned (no invalidation/fault), sufficient memory. Resources unlimited (null)
# so peak_walks (3c) and peak_buffer (3d) are measured directly.
name: baseline
mode: nested          # bare / s1_only / s2_only / nested
superpage: off          # off / 2M / 1G

caches:
  # IOTLB = fully-resolved IOVA->SPA (== G-final-L0 made directly VPN-hittable).
  iotlb: {enabled: true, entries: 16, assoc: 4}

  # VM-stage (guest, Sv39) PWC. L0 = leaf. root = guest root-table GPA (PDT), a register.
  vm_pwc:
    l2:   {enabled: true, entries: 1,  assoc: full}   # 1 GB region
    l1:   {enabled: true, entries: 2, assoc: full}   # 2 MB region
    l0:   {enabled: true, entries: 16, assoc: full}   # leaf PTE (streaming: ~no reuse)
    root: {enabled: true, entries: 1,  assoc: full}

  # G-stage PWC for the guest-TABLE-page GPAs (temporal, few; heavily reused),
  # separated per VM level: G-Lx@VM-Ly. root = shared G-stage root register.
  g_pwc:
    vm_l2: {l2: {enabled: false, entries: 1, assoc: full}, l1: {enabled: false, entries: 1, assoc: full}, l0: {enabled: false, entries: 1, assoc: full}}   # translate VM-root ptr
    vm_l1: {l2: {enabled: false, entries: 1, assoc: full}, l1: {enabled: false, entries: 1, assoc: full}, l0: {enabled: false, entries: 1, assoc: full}}   # translate VM-L2 PTE
    vm_l0: {l2: {enabled: false, entries: 1, assoc: full}, l1: {enabled: true, entries: 1, assoc: full}, l0: {enabled: true, entries: 1, assoc: full}}  # translate VM-L1 PTE
    root:  {enabled: true, entries : 1, assoc: full}

  # G-stage PWC for the final DATA GPA (spatial, streaming).
  g_final:
    l2: {enabled: true, entries: 1,  assoc: full}
    l1: {enabled: true, entries: 2,  assoc: full}
    l0: {enabled: true, entries: 16, assoc: 4}

  ddtc: {enabled: true, entries: 1, assoc: full}
  pdtc: {enabled: true, entries: 1, assoc: full}   # enabled:false (or entries:0) to disable
  msi:  {enabled: false}

  lookup_mode: hybrid     # parallel / sequential / hybrid
  # prefetch.algo (below) selects demand-only (off) vs predictive (next_line/stride/...)
  coalesce_factor: 8     # 64 B line / 8 B PTE
  context_walk: true      # model DDTW/PDTW (disabled DDTC/PDTC -> walk every request)
  ddt_levels: 3           # device directory (host) depth
  pdt_levels: 3           # process directory (guest -> nested) depth

walkers:  {num_walkers: 1, pipeline_depth: 2}        # null = unlimited (measure N)
buffers:  {iommu_req_buffer: 1, io_bridge_buffer: null}  # null = unlimited (measure peak)
prefetch: {algo: next_line, distance: 16, confidence: 2}      # off/next_line/stride/rpt/dcpt/sms
memory:   {latency_cycles: 40, max_outstanding: null, bank_parallel: true, coalescing_effective: true}
timing:   {clock_mhz: 400, lookup_cycles: 2, arbitration_cycles: 1, hit_latency_cycles: 1}
workload:
  iova_pattern: sequential # sequential / stride / random
  stride: 1
  data_gpa: sequential    # sequential / random
  n_requests: 8000
  invalidation: {rate: 0, target: s1, granularity: context}
  fault_rate: 0
  context_switch_rate: 0
  n_devices: 10
  n_pasids: 10
pa: {scale_factor: null}     # null = normalized; set a number to absolutize
